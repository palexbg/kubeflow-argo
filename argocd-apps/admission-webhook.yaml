apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: admission-webhook
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/palexbg/kubeflow-argo.git
    targetRevision: main
    path: apps/admission-webhook/upstream/overlays/cert-manager
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true