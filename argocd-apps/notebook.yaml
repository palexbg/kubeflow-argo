apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: notebook
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/palexbg/kubeflow-argo.git
    targetRevision: main
    path: apps/jupyter/jupyter-web-app/upstream/overlays/istio
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
